<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    /* ------------------------------------------------------------------ *
     * Pingo WhatsApp Sync — popup UI.
     * Dark theme with neon-green accents, matching the Pingo brand logo.
     * ------------------------------------------------------------------ */
    :root {
      --bg:          #0a0e0b;
      --surface:     rgba(255, 255, 255, 0.025);
      --surface-2:   rgba(255, 255, 255, 0.045);
      --border:      rgba(139, 255, 82, 0.14);
      --text:        #eaf2ea;
      --text-muted:  #8b968b;
      --accent:      #6ee31a;  /* neon green (glow)     */
      --accent-2:    #25d366;  /* WhatsApp green (solid) */
      --accent-glow: rgba(110, 227, 26, 0.35);
      --danger:      #ff6b6b;
      --warn:        #ffcc4d;
      --radius:      12px;
    }

    * { box-sizing: border-box; }

    body {
      width: 340px;
      margin: 0;
      padding: 0;
      font: 13px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(120% 90% at 50% -10%, rgba(110, 227, 26, 0.16), transparent 55%),
        var(--bg);
      -webkit-font-smoothing: antialiased;
    }

    .app { padding: 16px; }

    /* ---------- Header ---------- */
    .hero {
      display: flex;
      align-items: center;
      gap: 11px;
      margin-bottom: 14px;
    }
    .logo {
      width: 40px;
      height: 40px;
      flex: 0 0 auto;
      filter: drop-shadow(0 3px 9px var(--accent-glow));
    }
    .hero-text { flex: 1 1 auto; min-width: 0; }
    .hero-text h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .hero-text p {
      margin: 1px 0 0;
      font-size: 11px;
      color: var(--text-muted);
    }
    /* Readiness dot in the header — glows green when configured. */
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex: 0 0 auto;
      background: var(--text-muted);
      transition: background 0.2s, box-shadow 0.2s;
    }
    .status-dot.ok  { background: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .status-dot.err { background: var(--warn);   box-shadow: 0 0 0 3px rgba(255, 204, 77, 0.28); }

    /* ---------- Status banner ---------- */
    .banner {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 10px 12px;
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 12.5px;
      margin-bottom: 12px;
      border: 1px solid transparent;
    }
    .banner .icon { flex: 0 0 auto; width: 16px; height: 16px; }
    .banner.ok {
      color: var(--accent);
      background: rgba(110, 227, 26, 0.08);
      border-color: rgba(110, 227, 26, 0.22);
    }
    .banner.err {
      color: var(--warn);
      background: rgba(255, 204, 77, 0.07);
      border-color: rgba(255, 204, 77, 0.22);
    }
    .banner small { display: block; font-weight: 400; color: var(--text-muted); margin-top: 1px; }

    /* ---------- Cards ---------- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 11px 12px;
      margin-bottom: 10px;
    }
    .card-title {
      margin: 0 0 8px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      padding: 3px 0;
    }
    .row + .row { border-top: 1px solid rgba(255, 255, 255, 0.04); }
    .row .k { color: var(--text-muted); font-size: 11.5px; flex: 0 0 auto; }
    .row .v {
      font: 500 11.5px/1.4 ui-monospace, "SF Mono", "Cascadia Code", Menlo, monospace;
      text-align: right;
      word-break: break-all;
      overflow-wrap: anywhere;
    }
    .row .v.muted { color: var(--text-muted); }

    /* ---------- Sync button ---------- */
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 11px;
      margin-top: 4px;
      border: 0;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      color: #06210a;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 18px -6px var(--accent-glow);
      transition: transform 0.08s, box-shadow 0.2s, filter 0.2s;
    }
    .btn-primary:hover  { filter: brightness(1.06); box-shadow: 0 8px 22px -6px var(--accent-glow); }
    .btn-primary:active { transform: translateY(1px); }
    .btn-primary:disabled { cursor: default; filter: saturate(0.5) brightness(0.8); box-shadow: none; }
    .btn-primary .spinner { display: none; }
    .btn-primary.is-busy .spinner {
      display: block;
      width: 14px; height: 14px;
      border: 2px solid rgba(6, 33, 10, 0.35);
      border-top-color: #06210a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .btn-primary.is-busy .icon { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---------- Footer ---------- */
    .foot {
      margin: 12px 2px 0;
      font-size: 10.5px;
      line-height: 1.5;
      color: var(--text-muted);
    }
    .foot code {
      color: var(--accent);
      background: rgba(110, 227, 26, 0.08);
      padding: 1px 5px;
      border-radius: 5px;
      font-size: 10px;
    }

    @media (prefers-reduced-motion: reduce) {
      .btn-primary.is-busy .spinner { animation: none; }
      .btn-primary { transition: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="hero">
      <img class="logo" src="icons/logo.png" alt="Pingo logo" />
      <div class="hero-text">
        <h1>Pingo Sync</h1>
        <p>WhatsApp Session</p>
      </div>
      <span class="status-dot" id="status-dot" title="Configuration status"></span>
    </header>

    <div id="banner" class="banner err">Loading…</div>

    <section class="card">
      <div class="card-title">Configuration</div>
      <div id="config"></div>
    </section>

    <section class="card">
      <div class="card-title">Last sync</div>
      <div id="state"></div>
    </section>

    <button id="sync" class="btn-primary">
      <svg class="icon" viewBox="0 0 24 24" width="16" height="16" fill="none"
           stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 1 1-3-6.7" />
        <path d="M21 4v5h-5" />
      </svg>
      <span class="spinner"></span>
      <span id="sync-label">Sync now</span>
    </button>

    <p class="foot">
      Only Pingo (<code>pingonotify.com</code>) can configure this extension — see the README.
    </p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
